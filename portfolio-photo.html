<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Nhiếp Ảnh</title>
    <style>
        :root { --bg-color: #050505; --accent: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg-color); color: white; padding-bottom: 5rem; }
        
        /* Header mỏng */
        header { padding: 2rem 5%; display: flex; justify-content: space-between; align-items: center; }
        .back-btn { color: #888; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .back-btn:hover { color: white; }
        h1 { font-size: 2.5rem; letter-spacing: 2px; font-weight: 300; text-align: center; margin: 2rem 0 4rem; animation: fadeIn 1s ease; }
        
        /* Grid hình ảnh */
        .gallery { display: column; padding: 0 5%; column-count: 3; column-gap: 1.5rem; }
        .gallery-item { margin-bottom: 1.5rem; break-inside: avoid; overflow: hidden; border-radius: 4px; cursor: pointer; position: relative; animation: fadeIn 1s ease both; }
        .gallery-item img { width: 100%; display: block; transition: transform 0.5s ease, filter 0.5s ease; filter: grayscale(20%); }
        .gallery-item:hover img { transform: scale(1.05); filter: grayscale(0%); }
        
        /* Lớp phủ khi hover */
        .overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); opacity: 0; transition: 0.3s ease; display: flex; align-items: flex-end; padding: 1.5rem; }
        .gallery-item:hover .overlay { opacity: 1; }
        .overlay span { font-size: 1.1rem; letter-spacing: 1px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 900px) { .gallery { column-count: 2; } }
        @media (max-width: 600px) { .gallery { column-count: 1; } }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="back-btn">← Chuyển chuyên mục</a>
        <div>📷 [Tên của bạn]</div>
    </header>

    <h1>NHỮNG KHOẢNH KHẮC</h1>

    <div class="gallery">
        <div class="gallery-item" style="animation-delay: 0.1s;">
            <img src="https://images.unsplash.com/photo-1542038784456-1ea8e935640e?auto=format&fit=crop&w=600&q=80" alt="Photo">
            <div class="overlay"><span>Tên bộ ảnh 1</span></div>
        </div>
        <div class="gallery-item" style="animation-delay: 0.2s;">
            <img src="https://images.unsplash.com/photo-1452587925148-ce544e77e70d?auto=format&fit=crop&w=600&q=80" alt="Photo">
            <div class="overlay"><span>Chân dung</span></div>
        </div>
        <div class="gallery-item" style="animation-delay: 0.3s;">
            <img src="https://images.unsplash.com/photo-1469334031218-e382a71b716b?auto=format&fit=crop&w=600&q=80" alt="Photo">
            <div class="overlay"><span>Phong cảnh</span></div>
        </div>
        </div>
</body>
</html>
