<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khám phá Portfolio | [Tên của bạn]</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { overflow: hidden; background: #0f0f11; color: white; }
        
        .split-container { display: flex; width: 100vw; height: 100vh; }
        
        .side { position: relative; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; overflow: hidden; transition: flex 0.6s cubic-bezier(0.25, 0.8, 0.25, 1); cursor: pointer; text-decoration: none; color: white; }
        .side:hover { flex: 1.5; }
        
        /* Hình nền mờ */
        .side::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0.4; transition: opacity 0.6s, transform 0.6s; z-index: -1; }
        .side:hover::before { opacity: 0.8; transform: scale(1.05); }
        
        .side-3d::before { background-image: url('https://images.unsplash.com/photo-1631556097152-c3bfde812255?auto=format&fit=crop&w=1000&q=80'); }
        .side-photo::before { background-image: url('https://images.unsplash.com/photo-1516035069371-29a1b244cc32?auto=format&fit=crop&w=1000&q=80'); }
        
        .content { z-index: 1; transition: transform 0.4s; }
        .side:hover .content { transform: translateY(-10px); }
        
        h1 { font-size: 4rem; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        p { font-size: 1.2rem; letter-spacing: 2px; color: #00ffcc; text-transform: uppercase; opacity: 0; transform: translateY(20px); transition: all 0.4s ease 0.1s; }
        .side:hover p { opacity: 1; transform: translateY(0); }

        @media (max-width: 768px) {
            .split-container { flex-direction: column; }
            .side:hover { flex: 1.2; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="split-container">
        <a href="portfolio-3d.html" class="side side-3d">
            <div class="content">
                <h1>Đồ Họa 3D</h1>
                <p>Khám phá dự án & Web</p>
            </div>
        </a>
        <a href="portfolio-photo.html" class="side side-photo">
            <div class="content">
                <h1>Nhiếp Ảnh</h1>
                <p>Góc nhìn qua ống kính</p>
            </div>
        </a>
    </div>
</body>
</html>
