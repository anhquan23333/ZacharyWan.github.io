<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Portfolio</title>
    <style>
        :root { --bg-color: #000; --text-main: #fff; --accent: #fff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); }
        
        /* Navbar tối giản */
        nav { display: flex; justify-content: space-between; padding: 2rem 5%; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 100; }
        .logo { font-weight: bold; letter-spacing: 2px; }
        .nav-links a { color: gray; text-decoration: none; margin-left: 2rem; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: white; }

        .header { text-align: center; padding: 5rem 5% 2rem; }
        .header h1 { font-size: 3rem; font-weight: 300; letter-spacing: 4px; text-transform: uppercase; }
        
        /* Lưới ảnh (Masonry CSS thuần) */
        .gallery { column-count: 3; column-gap: 1.5rem; padding: 2rem 5% 5rem; }
        .gallery-item { break-inside: avoid; margin-bottom: 1.5rem; overflow: hidden; border-radius: 4px; position: relative; cursor: pointer; }
        .gallery-item img { width: 100%; display: block; transition: transform 0.5s ease; filter: grayscale(20%); }
        .gallery-item:hover img { transform: scale(1.05); filter: grayscale(0%); }
        
        /* Overlay text khi hover */
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.3s ease; display: flex; align-items: flex-end; padding: 1.5rem; }
        .gallery-item:hover .overlay { opacity: 1; }
        .overlay h3 { font-size: 1.2rem; font-weight: 400; }

        @media (max-width: 900px) { .gallery { column-count: 2; } }
        @media (max-width: 600px) { .gallery { column-count: 1; } .header h1 { font-size: 2rem; } }
        
        .fade-in { animation: fadeIn 1.5s ease forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">LENS.</div>
        <div class="nav-links">
            <a href="index.html">3D & Web</a>
            <a href="photography.html" class="active">Photography</a>
        </div>
    </nav>

    <div class="header fade-in">
        <h1>Moments Captured</h1>
    </div>

    <div class="gallery fade-in" style="animation-delay: 0.3s;">
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?auto=format&fit=crop&w=600&q=80" alt="Ảnh 1">
            <div class="overlay"><h3>Tên Bộ Ảnh 1</h3></div>
        </div>
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&w=600&q=80" alt="Ảnh 2">
            <div class="overlay"><h3>Tên Bộ Ảnh 2</h3></div>
        </div>
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&w=600&q=80" alt="Ảnh 3">
            <div class="overlay"><h3>Tên Bộ Ảnh 3</h3></div>
        </div>
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1551334787-21e6bd3ab135?auto=format&fit=crop&w=600&q=80" alt="Ảnh 4">
            <div class="overlay"><h3>Tên Bộ Ảnh 4</h3></div>
        </div>
        <div class="gallery-item">
            <img src="https://images.unsplash.com/photo-1533561052604-c3beb6fac0e5?auto=format&fit=crop&w=600&q=80" alt="Ảnh 5">
            <div class="overlay"><h3>Tên Bộ Ảnh 5</h3></div>
        </div>
    </div>

</body>
</html>
